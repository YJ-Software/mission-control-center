# Fail2Ban filter for Mission Control Center failed logins.
#
# Matches lines emitted by src/app/api/auth/route.ts on a bad password.
# Keep the log prefix `[mc-auth] failed login from <ip>` stable — changing
# the format requires updating this regex in lockstep.

[INCLUDES]
before = common.conf

[Definition]
_daemon = mission-control

failregex = \[mc-auth\] failed login from <HOST>\s*$

ignoreregex =
